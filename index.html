<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#101312">
    <title>Signal Relay</title>
    <link rel="icon" href="/src/client/assets/generated/ui-icon-atlas.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/src/client/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud">
        <div class="brand">
          <strong>Signal Relay</strong>
          <span id="netStatus">BOT CO-OP</span>
        </div>
        <div class="meters">
          <span id="chargeMeter">C 110</span>
          <span id="linkMeter">L 50</span>
          <span id="gemMeter">G 30</span>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="gameCanvas" width="390" height="500" aria-label="Signal Relay cooperative defense board"></canvas>
        <div id="toast" class="toast" hidden></div>
      </section>

      <section id="launchOverlay" class="launch-overlay">
        <div class="launch-panel">
          <span class="launch-kicker">SEASON 01</span>
          <strong>Signal Relay</strong>
          <p>Co-op loop defense</p>
          <div class="launch-map-preview" aria-hidden="true"></div>
          <div class="launch-loadout" aria-label="run loadout">
            <span class="launch-chip">BOT READY</span>
            <span class="launch-chip">LOOP MAP</span>
            <span class="launch-chip">NO PAY POWER</span>
          </div>
          <div class="launch-contract">
            <span>DAILY CONTRACT</span>
            <strong>Clear Wave 3</strong>
            <em>Reward 8 G</em>
          </div>
          <div class="launch-actions">
            <button id="launchBotButton">Start Bot Co-op</button>
            <button id="launchOnlineButton">Online Match</button>
          </div>
        </div>
      </section>

      <section id="resultOverlay" class="result-overlay" hidden>
        <div class="result-panel">
          <span id="resultCode" class="result-code">RUN COMPLETE</span>
          <strong id="resultTitle">Signal Lock</strong>
          <p id="resultReason" class="result-reason">Loop stabilized.</p>
          <div id="resultStats" class="result-stats">
            <span>Wave --</span>
            <span>Time --</span>
            <span>Kills --</span>
          </div>
          <div id="resultReward" class="result-reward">Mission rewards secured</div>
          <div class="result-actions">
            <button id="resultRetryButton">Run Again</button>
            <button id="resultLobbyButton">Ready Room</button>
          </div>
        </div>
      </section>

      <section class="action-panel">
        <div class="status-line">
          <span id="waveMeter">Wave 1</span>
          <span id="signalMeter">Signal 100 / Sat 0</span>
          <span id="bossMeter">Boss --</span>
        </div>
        <div class="primary-actions">
          <button id="supplyButton">Supply</button>
          <button id="mergeButton">Merge x3</button>
          <button id="swapButton">Swap</button>
          <button id="focusButton">Focus</button>
          <button id="pulseButton">Link Pulse</button>
          <button id="overclockButton">Overclock</button>
        </div>
        <div class="secondary-actions">
          <button id="botButton">Bot</button>
          <button id="onlineButton">Online</button>
          <button id="shopButton">BM / Missions</button>
        </div>
      </section>

      <section id="drawer" class="drawer" hidden>
        <div class="drawer-head">
          <strong>BM / Missions</strong>
          <button id="closeDrawer">Close</button>
        </div>
        <div id="shopList" class="list"></div>
      </section>
    </main>
    <script type="module" src="/src/client/app.js"></script>
  </body>
</html>
