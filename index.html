<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#101820">
    <title>ProjectAuto: Relay Defense</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/src/client/styles.css">
  </head>
  <body>
    <main id="app" class="shell">
      <section class="topbar">
        <div>
          <strong>Relay Defense</strong>
          <span id="netStatus">BOT CO-OP</span>
        </div>
        <div class="meters">
          <span id="hpMeter">HP 24</span>
          <span id="scrapMeter">180</span>
          <span id="coreMeter">25</span>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="gameCanvas" width="390" height="720" aria-label="cooperative tower defense board"></canvas>
        <div id="toast" class="toast" hidden></div>
      </section>

      <nav class="tabs" aria-label="game panels">
        <button class="tab active" data-panel="build">Build</button>
        <button class="tab" data-panel="squad">Squad</button>
        <button class="tab" data-panel="shop">BM</button>
      </nav>

      <section class="panel active" id="buildPanel">
        <div class="tower-row" id="towerButtons"></div>
        <div class="actions">
          <button id="upgradeButton">Upgrade</button>
          <button id="botButton">Bot Mode</button>
          <button id="onlineButton">Online</button>
        </div>
      </section>

      <section class="panel" id="squadPanel">
        <div id="squadList" class="list"></div>
      </section>

      <section class="panel" id="shopPanel">
        <div id="shopList" class="list"></div>
      </section>
    </main>
    <script type="module" src="/src/client/app.js"></script>
  </body>
</html>
