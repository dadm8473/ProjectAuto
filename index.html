<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#11161f">
    <title>Fortune Relay</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/src/client/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud">
        <div class="brand">
          <strong>Fortune Relay</strong>
          <span id="netStatus">BOT CO-OP</span>
        </div>
        <div class="meters">
          <span id="goldMeter">G 120</span>
          <span id="manaMeter">M 40</span>
          <span id="gemMeter">D 30</span>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="gameCanvas" width="390" height="720" aria-label="Fortune Relay cooperative defense board"></canvas>
        <div id="toast" class="toast" hidden></div>
      </section>

      <section class="action-panel">
        <div class="status-line">
          <span id="waveMeter">Wave 1</span>
          <span id="pressureMeter">Pressure 0/100</span>
          <span id="bossMeter">Boss --</span>
        </div>
        <div class="primary-actions">
          <button id="summonButton">Summon</button>
          <button id="mergeButton">Merge x3</button>
          <button id="chanceButton">Chance Up</button>
          <button id="boostButton">Partner Boost</button>
        </div>
        <div class="secondary-actions">
          <button id="botButton">Bot</button>
          <button id="onlineButton">Online</button>
          <button id="shopButton">BM / Missions</button>
        </div>
      </section>

      <section id="drawer" class="drawer" hidden>
        <div class="drawer-head">
          <strong>BM / Missions</strong>
          <button id="closeDrawer">Close</button>
        </div>
        <div id="shopList" class="list"></div>
      </section>
    </main>
    <script type="module" src="/src/client/app.js"></script>
  </body>
</html>
