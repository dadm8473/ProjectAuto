<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#101312">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="신호릴레이">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>신호릴레이</title>
    <link rel="icon" href="/src/client/assets/generated/reboot-app-icon-192.png">
    <link rel="apple-touch-icon" href="/src/client/assets/generated/reboot-app-icon-192.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/src/client/styles.css?v=hud-icon-meters1">
  </head>
  <body data-app-screen="splash">
    <main class="shell">
      <section id="loadingGate" class="loading-gate" data-loading-state="loading" aria-live="polite" aria-label="신호릴레이 작전 준비">
        <img class="loading-gate-icon" src="/src/client/assets/generated/reboot-app-icon-192.png" alt="" aria-hidden="true">
        <span class="loading-gate-title-plate" aria-hidden="true"></span>
        <span class="loading-gate-emblem" aria-hidden="true"></span>
        <strong>작전 준비</strong>
        <span class="loading-gate-bar" aria-hidden="true"><i></i></span>
      </section>

      <section class="hud">
        <button id="soundToggle" class="sound-toggle" type="button" aria-label="소리 켜기" title="소리 켜기" data-audio-enabled="false"><span aria-hidden="true"></span></button>
        <div class="brand">
          <strong id="gameTitle">신호릴레이</strong>
          <span id="netStatus">동료 협동</span>
        </div>
        <div class="meters">
          <span id="summonMeter" data-meter-kind="summon" aria-label="전력 10"><span class="meter-label">전력</span><span class="meter-value">10</span></span>
          <span id="rescueMeter" data-meter-kind="rescue" aria-label="구원 충전 0%"><span class="meter-label">구원</span><span class="meter-value">0%</span></span>
          <span id="dangerMeter" data-meter-kind="danger" aria-label="파트너 위험도 0"><span class="meter-label">위험</span><span class="meter-value">0</span></span>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="gameCanvas" width="390" height="620" aria-label="신호릴레이 협동 타워디펜스 전장"></canvas>
      </section>

      <section id="matchmakingBanner" class="matchmaking-banner" data-match-state="waiting" hidden aria-live="polite">
        <strong id="matchmakingBannerTitle">파트너 대기</strong>
        <span id="matchmakingBannerDetail">온라인 매칭 중</span>
      </section>

      <section id="launchOverlay" class="screen-overlay" data-screen="splash">
        <div id="splashScreen" class="app-screen splash-screen" data-screen-panel="splash">
          <div class="splash-title-lockup">
            <span class="splash-season">시즌 01</span>
            <span class="splash-title-wordmark" aria-hidden="true"></span>
            <strong>신호릴레이</strong>
            <p>소환, 합성, 구원으로 파트너와 버티세요</p>
          </div>
          <button id="splashStartButton">시작</button>
          <span class="splash-floor-cap" aria-hidden="true"></span>
        </div>

        <div id="lobbyScreen" class="app-screen lobby-screen" data-screen-panel="lobby" hidden>
          <div id="lobbyContent"></div>
          <div class="launch-command-console" data-launch-console="operation">
            <button id="launchBotButton" class="play-button" data-launch-action="bot" data-launch-priority="primary" aria-label="첫 구원 작전 출격">
              <img class="launch-button-frame" src="/src/client/assets/generated/reboot-launch-primary.png?v=gold-cta-alpha1" alt="" aria-hidden="true">
              <small class="launch-button-kicker">봇 동료</small>
              <span>출격</span>
            </button>
            <button id="launchOnlineButton" class="match-button" data-launch-action="online" data-launch-priority="secondary" aria-label="온라인 협동 출격">
              <img class="launch-button-frame" src="/src/client/assets/generated/reboot-launch-secondary.png?v=gold-cta-alpha1" alt="" aria-hidden="true">
              <small class="launch-button-kicker">온라인</small>
              <span>협동</span>
            </button>
          </div>
        </div>

        <div id="collectionScreen" class="app-screen hub-screen" data-screen-panel="collection" hidden>
          <button class="screen-back" data-open-screen="lobby" data-nav-icon="home" aria-label="준비실로 돌아가기">준비실</button>
          <h1 data-title-icon="collection" data-station-kind="collection"><span class="hub-station-label">정비실</span><span class="hub-title-wordmark" aria-hidden="true"></span><span class="hub-title-text">유닛</span></h1>
          <div id="collectionList" class="screen-list"></div>
        </div>

        <div id="shopScreen" class="app-screen hub-screen" data-screen-panel="shop" hidden>
          <button class="screen-back" data-open-screen="lobby" data-nav-icon="home" aria-label="준비실로 돌아가기">준비실</button>
          <h1 data-title-icon="shop" data-station-kind="shop"><span class="hub-station-label">보급소</span><span class="hub-title-wordmark" aria-hidden="true"></span><span class="hub-title-text">상점</span></h1>
          <div id="shopList" class="screen-list"></div>
        </div>

        <div id="missionsScreen" class="app-screen hub-screen" data-screen-panel="missions" hidden>
          <button class="screen-back" data-open-screen="lobby" data-nav-icon="home" aria-label="준비실로 돌아가기">준비실</button>
          <h1 data-title-icon="missions" data-station-kind="missions"><span class="hub-station-label">작전판</span><span class="hub-title-wordmark" aria-hidden="true"></span><span class="hub-title-text">미션</span></h1>
          <div id="missionsList" class="screen-list"></div>
        </div>

        <div id="seasonScreen" class="app-screen hub-screen" data-screen-panel="season" hidden>
          <button class="screen-back" data-open-screen="lobby" data-nav-icon="home" aria-label="준비실로 돌아가기">준비실</button>
          <h1 data-title-icon="season" data-station-kind="season"><span class="hub-station-label">시즌실</span><span class="hub-title-wordmark" aria-hidden="true"></span><span class="hub-title-text">시즌</span></h1>
          <div id="seasonList" class="screen-list"></div>
        </div>

        <nav class="bottom-dock" aria-label="메뉴">
          <button data-open-screen="collection" data-nav-icon="collection" aria-label="유닛"><span class="nav-alert-badge" aria-hidden="true"></span><span class="nav-label">유닛</span></button>
          <button data-open-screen="shop" data-nav-icon="shop" aria-label="상점"><span class="nav-alert-badge" aria-hidden="true"></span><span class="nav-label">상점</span></button>
          <button data-open-screen="missions" data-nav-icon="missions" aria-label="미션"><span class="nav-alert-badge" aria-hidden="true"></span><span class="nav-label">미션</span></button>
          <button data-open-screen="season" data-nav-icon="season" aria-label="시즌"><span class="nav-alert-badge" aria-hidden="true"></span><span class="nav-label">시즌</span></button>
        </nav>
      </section>

      <section id="resultOverlay" class="result-overlay" hidden>
        <div class="result-panel">
          <span id="resultOutcomeAura" class="result-outcome-aura" aria-hidden="true"></span>
          <span id="resultHeroStage" class="result-hero-stage" aria-hidden="true"></span>
          <span id="resultFinale" class="result-finale" aria-hidden="true"></span>
          <div class="result-verdict-stack">
            <span id="resultCode">전투 완료</span>
            <strong id="resultTitle"><span class="result-title-text">승리</span></strong>
            <p id="resultReason">파트너를 구했습니다</p>
            <p id="resultNextGoal">다음 판 목표</p>
          </div>
          <div id="resultHighlights" class="result-highlights"></div>
          <div class="result-command-board" role="group" aria-label="전투 결과 보상과 다음 행동">
            <div id="resultReward" class="result-reward" role="group"></div>
            <div class="result-actions">
              <button id="resultRetryButton" class="result-action-button result-action-primary"><span>다시 도전</span></button>
              <button id="resultLobbyButton" class="result-action-button result-action-secondary"><span>준비실</span></button>
            </div>
          </div>
        </div>
      </section>

      <section id="rewardReveal" class="reward-reveal" hidden aria-live="polite">
        <span class="reward-reveal-burst" aria-hidden="true"></span>
        <span id="rewardRevealSource" class="reward-reveal-source" data-reveal-source="missions" aria-hidden="true"></span>
        <span id="rewardRevealIcon" class="reward-reveal-icon" data-reveal-icon="soft_currency" aria-hidden="true"></span>
        <span id="rewardRevealTitle">보상 획득</span>
        <strong id="rewardRevealDetail">보석 +0</strong>
      </section>

      <span id="screenTransitionFx" class="screen-transition-fx" aria-hidden="true"></span>
      <div id="toast" class="toast" hidden></div>

      <section class="action-panel" role="toolbar" aria-label="전투 행동">
        <div class="status-line">
          <span id="timeMeter">0초</span>
          <span id="bossMeter" hidden>보스 경고</span>
        </div>
        <div class="primary-actions">
          <button id="summonButton" aria-label="소환"><span>소환</span></button>
          <button id="mergeButton" aria-label="합성"><span>합성</span></button>
          <button id="rescueButton" aria-label="구원"><span>구원</span></button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/client/app.js?v=start-cutin-focus1"></script>
  </body>
</html>
