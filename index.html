<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#101312">
    <title>시그널 릴레이</title>
    <link rel="icon" href="/src/client/assets/generated/ui-icon-atlas.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/src/client/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud">
        <div class="brand">
          <strong>시그널 릴레이</strong>
          <span id="netStatus">봇 협동</span>
        </div>
        <div class="meters">
          <span id="chargeMeter" aria-label="전력: 릴레이 보급에 쓰는 전투 자원">전력 110</span>
          <span id="linkMeter" aria-label="협력: 파트너 구원에 쓰는 협동 자원">협력 50</span>
          <span id="gemMeter" aria-label="젬: 미션과 웨이브 보상으로 얻는 해금 재화">젬 30</span>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="gameCanvas" width="390" height="500" aria-label="시그널 릴레이 협동 타워디펜스 전장"></canvas>
        <div id="toast" class="toast" hidden></div>
        <div id="coachCue" class="coach-cue" hidden aria-live="polite" aria-atomic="true"></div>
      </section>

      <section id="launchOverlay" class="launch-overlay">
        <div class="launch-panel">
          <span class="launch-kicker">시즌 01</span>
          <strong>시그널 릴레이</strong>
          <p>협동 타워디펜스</p>
          <div class="launch-map-preview" aria-hidden="true"></div>
          <div class="launch-loadout" aria-label="전투 세팅">
            <span class="launch-chip">봇</span>
            <span class="launch-chip">루프</span>
            <span class="launch-chip">공정</span>
          </div>
          <div class="launch-contract">
            <span>오늘의 미션</span>
            <strong>3웨이브 클리어</strong>
            <em>보상 8젬</em>
          </div>
          <div class="launch-menu">
            <button id="launchBotButton">봇과 시작</button>
            <button id="launchOnlineButton">온라인 매칭</button>
            <button id="launchGrowthButton" aria-label="성장과 미션 보기">성장</button>
          </div>
        </div>
      </section>

      <section id="resultOverlay" class="result-overlay" hidden>
        <div class="result-panel">
          <span id="resultCode" class="result-code">전투 완료</span>
          <strong id="resultTitle">신호 고정</strong>
          <p id="resultReason" class="result-reason">루프가 안정화되었습니다.</p>
          <div id="resultStats" class="result-stats">
            <span>웨이브 --</span>
            <span>시간 --</span>
            <span>처치 --</span>
          </div>
          <div id="resultHighlights" class="result-highlights"></div>
          <div id="resultProgress" class="result-progress"></div>
          <div id="resultReward" class="result-reward">미션 보상 확보</div>
          <div class="result-actions">
            <button id="resultRetryButton">다시 도전</button>
            <button id="resultLobbyButton">준비실</button>
          </div>
        </div>
      </section>

      <section class="action-panel" role="toolbar" aria-label="전투 행동">
        <div class="status-line">
          <span id="waveMeter" aria-label="현재 웨이브">웨이브 1</span>
          <span id="signalMeter" aria-label="신호 체력과 오염 위험">신호 100 / 오염 0</span>
          <span id="bossMeter" aria-label="보스 제한 시간">보스 --</span>
        </div>
        <div class="primary-actions">
          <button id="powerButton" aria-label="보급 또는 합성 자동 선택">강화</button>
          <button id="pulseButton" aria-label="파트너 구원">구원</button>
        </div>
      </section>

      <section id="drawer" class="drawer" hidden>
        <div class="drawer-head">
          <strong>성장</strong>
          <button id="closeDrawer">닫기</button>
        </div>
        <div id="shopList" class="list"></div>
      </section>
    </main>
    <script type="module" src="/src/client/app.js"></script>
  </body>
</html>
